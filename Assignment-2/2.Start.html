<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HISTMAP</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
        /* Base styles */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  
  body {
    font-family: "Inter", sans-serif;
  }
  
  a {
    text-decoration: none;
    color: inherit;
  }
  
  .container {
    width: 100%;
    min-height: 100vh;
    background-color: #fff;
  }
  
  /* Navigation styles */
  .nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 35px;
    height: 108px;
    background-color: rgba(0, 0, 0, 0.98);
  }
  
  .logo {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  
  .logo-img {
    width: 90px;
    height: 90px;
  }
  
  .logo-text {
    color: #fff;
    font-family: "Inter", sans-serif;
    font-size: 48px;
    font-weight: 700;
  }
  
  .nav-links {
    display: flex;
    align-items: center;
    gap: 32px;
  }
  
  .nav-item {
    color: #fff;
    font-family: "Inter", sans-serif;
    font-size: 36px;
    font-weight: 700;
  }
  
  .signup-btn {
    border-radius: 90px;
    padding: 6px 15px;
    color: #000;
    font-family: "Inter", sans-serif;
    font-size: 36px;
    font-weight: 700;
    background-color: #fff;
    border: none;
    cursor: pointer;
  }
  
  /* Main content styles */
  .main-content {
    background: url("https://cdn.builder.io/api/v1/image/assets/TEMP/96430f5a14f7524820fc50a687f8de7b3f1b3697")
      no-repeat center;
    background-size: cover;
    height: 663px;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  
  .form-container {
    display: flex;
    flex-direction: column;
    gap: 64px;
    align-items: center;
  }
  
  .form-group {
    display: flex;
    align-items: center;
    gap: 38px;
    width: 740px;
  }
  
  .label {
    color: #fff;
    font-family: "Inter", sans-serif;
    font-size: 36px;
    font-weight: 700;
    width: 126px;
    text-align: center;
  }
  
  .input-field {
    width: 600px;
    height: 55px;
    border-radius: 90px;
    border: none;
    background-color: #fff;
    padding: 0 20px;
  }
  
  .submit-btn {
    width: 225px;
    height: 70px;
    border-radius: 90px;
    color: #000;
    font-family: "Inter", sans-serif;
    font-size: 48px;
    font-weight: 700;
    border: none;
    cursor: pointer;
    background-color: #fff;
  }
  
  /* Footer styles */
  .footer {
    background-color: #262525;
  }
  
  .footer-upper {
    padding: 23px 74px;
    color: #fff;
  }
  
  .footer-content {
    display: flex;
    justify-content: space-between;
  }
  
  .footer-links {
    font-family: "Inter", sans-serif;
    font-size: 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  
  .footer-logo {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  
  .footer-logo-img {
    width: 90px;
    height: 90px;
  }
  
  .footer-logo-text {
    font-family: "Inter", sans-serif;
    font-size: 48px;
    font-weight: 700;
  }
  
  .footer-nav {
    display: flex;
    gap: 102px;
  }
  
  .nav-col {
    font-family: "Inter", sans-serif;
    font-size: 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  
  .contact-info {
    font-family: "Inter", sans-serif;
    font-size: 24px;
    display: flex;
    flex-direction: column;
    gap: 15px;
  }
  
  .footer-lower {
    padding: 18px 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: #fff;
    background-color: rgba(0, 0, 0, 0.98);
  }
  
  .copyright {
    font-family: "Inter", sans-serif;
    font-size: 24px;
    font-weight: 700;
  }
  
  .footer-brand {
    display: flex;
    align-items: center;
    gap: 9px;
  }
  
  .brand-logo {
    width: 52px;
    height: 50px;
  }
  
  .brand-text {
    font-family: "Inter", sans-serif;
    font-size: 32px;
    font-weight: 700;
  }
  
  .social-icons {
    display: flex;
    gap: 11px;
  }
  
  .social-icon {
    width: 50px;
    height: 50px;
  }
  
  /* Responsive styles */
  @media (max-width: 991px) {
    .nav {
      padding: 0 20px;
    }
  
    .nav-links {
      display: none;
    }
  
    .form-group {
      width: 100%;
      max-width: 600px;
    }
  
    .input-field {
      width: 100%;
    }
  
    .footer-content {
      flex-direction: column;
      align-items: center;
      gap: 30px;
    }
  
    .footer-nav {
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 30px;
    }
  
    .contact-info {
      text-align: center;
    }
  }
  
  @media (max-width: 640px) {
    .logo-img {
      width: 60px;
      height: 60px;
    }
  
    .logo-text {
      font-size: 32px;
    }
  
    .form-container {
      padding: 0 20px;
    }
  
    .label {
      font-size: 24px;
      width: 80px;
    }
  
    .submit-btn {
      width: 180px;
      height: 50px;
      font-size: 32px;
    }
  
    .footer-lower {
      flex-direction: column;
      gap: 20px;
      text-align: center;
    }
  
    .social-icons {
      justify-content: center;
    }
  }
  
    </style>
  </head>
  <body>
    <div class="container">
      <header class="nav">
        <div class="logo">
          <img
            src="https://cdn.builder.io/api/v1/image/assets/TEMP/0c3e45c20a7cb4635d69ab30bd057e67356cfb0a"
            alt="World Map"
            class="logo-img"
          />
          <h1 class="logo-text">HISTMAP</h1>
        </div>
        <nav class="nav-links">
          <a href="map.html" class="nav-item">Map</a>
          <a href="servi.html" class="nav-item">Services</a>
          <a href="loction.html" class="nav-item">Location</a>
          <a href="about.html" class="nav-item">About Us</a>
          <button class="signup-btn">Sign-Up</button>
        </nav>
      </header>

      <main class="main-content">
        <form class="form-container">
          <div class="form-group">
            <label for="name" class="label">Name</label>
            <input type="text" id="name" class="input-field" />
          </div>
          <div class="form-group">
            <label for="age" class="label">Age</label>
            <input type="text" id="age" class="input-field" />
          </div>
          <div class="form-group">
            <label for="weight" class="label">Weight</label>
            <input type="text" id="weight" class="input-field" />
          </div>
          <button type="submit" class="submit-btn">SUBMIT</button>
        </form>
      </main>

      <footer class="footer">
        <div class="footer-upper">
          <div class="footer-content">
            <nav class="footer-links">
              <a href="#" class="link-item">Home</a>
              <a href="#" class="link-item">Projects</a>
              <a href="#" class="link-item">Blog</a>
              <a href="#" class="link-item">About Us</a>
              <a href="#" class="link-item">Services</a>
            </nav>

            <div class="footer-logo">
              <img
                src="https://cdn.builder.io/api/v1/image/assets/TEMP/0c3e45c20a7cb4635d69ab30bd057e67356cfb0a"
                alt="World Map"
                class="footer-logo-img"
              />
              <h2 class="footer-logo-text">HISTMAP</h2>
            </div>

            <div class="footer-nav">
              <nav class="nav-col">
                <a href="#" class="link-item">Location</a>
                <a href="#" class="link-item">Map</a>
                <a href="#" class="link-item">Services</a>
                <a href="#" class="link-item">Histmap</a>
                <a href="#" class="link-item">Places</a>
              </nav>
              <div class="contact-info">
                <p class="contact-item">Email: contact@histmap.com</p>
                <p class="contact-item">Phone: +91 123456-7890</p>
              </div>
            </div>
          </div>
        </div>

        <div class="footer-lower">
          <p class="copyright">©Histmap|All Rights Reserved</p>
          <div class="footer-brand">
            <img
              src="https://cdn.builder.io/api/v1/image/assets/TEMP/420abec3484647c62ca80057c2f696f4f4da0a5e"
              alt="World Map"
              class="brand-logo"
            />
            <span class="brand-text">HISTMAP</span>
          </div>
          <div class="social-icons">
            <a href="#" aria-label="Instagram">
              <img
                src="https://cdn.builder.io/api/v1/image/assets/TEMP/605f74214bdb9e2f585ae7be8ee9631a2f9e6dfa"
                alt="Instagram"
                class="social-icon"
              />
            </a>
            <a href="#" aria-label="Facebook">
              <img
                src="https://cdn.builder.io/api/v1/image/assets/TEMP/f281fbcc792ddd3c872b221ff2db339eb7b26428"
                alt="Facebook"
                class="social-icon"
              />
            </a>
            <a href="#" aria-label="YouTube">
              <img
                src="https://cdn.builder.io/api/v1/image/assets/TEMP/084dc7e795fbdc07a5d3354a2e77b13391c9cb08"
                alt="YouTube"
                class="social-icon"
              />
            </a>
            <a href="#" aria-label="X">
              <img
                src="https://cdn.builder.io/api/v1/image/assets/TEMP/5df0d5ba7bf258e8c8ca4f8b46bd8e35a0465a5c"
                alt="X"
                class="social-icon"
              />
            </a>
          </div>
        </div>
      </footer>
    </div>
  </body>
</html>
